name: workout-check
# Checks for a newly synced activity every hour and, if one appeared,
# refreshes the post-sync metrics (training readiness/status, nutrition)
# and activity details.
#
# Normal run cost: 1 Garmin API call (activity list).
# Post-workout run cost: ~10 calls (activity list + 4 post-sync metrics +
# activity details).
#
# See today-refresh.yml for the 6-hour live-metrics refresh.

on:
  schedule:
    # Every hour at :30 to avoid top-of-hour runner contention and overlap
    # with the daily-refresh at 03:17.
    - cron: '30 * * * *'
  workflow_dispatch:

concurrency:
  group: garmin-refresh
  cancel-in-progress: false

jobs:
  check:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11.9"

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Check for new workout
        env:
          TODAY_REFRESH_MODE: workout
          GARTH_TOKENS_B64: ${{ secrets.GARTH_TOKENS_B64 }}
          S3_CACHE_BUCKET: ${{ secrets.S3_CACHE_BUCKET }}
          S3_ENDPOINT_URL: ${{ secrets.S3_ENDPOINT_URL }}
          S3_CACHE_PREFIX: ${{ secrets.S3_CACHE_PREFIX }}
          AWS_ACCESS_KEY_ID: ${{ secrets.AWS_ACCESS_KEY_ID }}
          AWS_SECRET_ACCESS_KEY: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          GARMIN_READONLY: "false"
          GARMIN_RATE_LIMIT_MAX_RETRIES: "0"
          ALLOW_OAUTH_REFRESH: "true"
        run: python scripts/today_refresh.py
