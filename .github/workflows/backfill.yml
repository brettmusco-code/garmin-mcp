name: backfill
# Gap-fills the R2 cache for the last N days. Talks to Garmin directly via
# the app.garmin module — does NOT go through the production web MCP (which
# is in readonly mode). Only fetches (metric, date) pairs that aren't
# already cached — safe to re-run idempotently.
#
# Manual trigger only. Garmin's rate-limit exposure is contained to this
# single GitHub container.

on:
  workflow_dispatch:
    inputs:
      days_back:
        description: "How many days back to gap-fill"
        required: true
        default: "180"
        type: string

jobs:
  backfill:
    runs-on: ubuntu-latest
    timeout-minutes: 120
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11.9"

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Run backfill
        env:
          # Garmin auth (same tokens the MCP uses)
          GARTH_TOKENS_B64: ${{ secrets.GARTH_TOKENS_B64 }}
          # R2 cache config (same bucket the MCP reads from)
          S3_CACHE_BUCKET: ${{ secrets.S3_CACHE_BUCKET }}
          S3_ENDPOINT_URL: ${{ secrets.S3_ENDPOINT_URL }}
          S3_CACHE_PREFIX: ${{ secrets.S3_CACHE_PREFIX }}
          AWS_ACCESS_KEY_ID: ${{ secrets.AWS_ACCESS_KEY_ID }}
          AWS_SECRET_ACCESS_KEY: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          # Explicitly NOT readonly — this job needs live Garmin calls
          GARMIN_READONLY: "false"
          # Backfill window
          DAYS_BACK: ${{ inputs.days_back }}
        run: python scripts/backfill_direct.py
