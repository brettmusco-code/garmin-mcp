name: today-refresh
# Mid-day refresh — every 30 min, repulls today's metrics + activities +
# activity details. Keeps the cache current for sessions completed during
# the day so claude.ai /weekly and /session-review can read fresh data
# without waiting for the 3am nightly.
#
# Scheduled runs will NOT resume after a workflow disable+enable until
# this file is committed. Bump the header comment to trigger GitHub's
# schedule re-registration when needed.

on:
  schedule:
    # Every 2 hours. Previous cadence was 30 min (~48 runs/day) to keep
    # the cached OAuth2 token warm between runs. But each run still calls
    # Garmin data endpoints (force-refresh of today's summaries and
    # activities), contributing to the per-account rolling counter that
    # triggers 429s on the OAuth exchange endpoint. 2h cadence = ~12
    # runs/day while still catching late-afternoon/evening sessions
    # within 2 hours of completion. Token staleness between runs is
    # irrelevant: ALLOW_OAUTH_REFRESH=false means today-refresh never
    # calls exchange anyway — the anchor daily-refresh owns that.
    - cron: '0 */2 * * *'
  workflow_dispatch:

jobs:
  refresh:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11.9"

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Run today refresh
        env:
          GARTH_TOKENS_B64: ${{ secrets.GARTH_TOKENS_B64 }}
          S3_CACHE_BUCKET: ${{ secrets.S3_CACHE_BUCKET }}
          S3_ENDPOINT_URL: ${{ secrets.S3_ENDPOINT_URL }}
          S3_CACHE_PREFIX: ${{ secrets.S3_CACHE_PREFIX }}
          AWS_ACCESS_KEY_ID: ${{ secrets.AWS_ACCESS_KEY_ID }}
          AWS_SECRET_ACCESS_KEY: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          GARMIN_READONLY: "false"
          # Only the daily-refresh anchor run may contact Garmin's
          # OAuth exchange endpoint. This run skips refresh and reads
          # whatever R2 has. If the token is expired, the next daily-
          # refresh will rotate it (3am ET).
          ALLOW_OAUTH_REFRESH: "false"
        run: python scripts/today_refresh.py
