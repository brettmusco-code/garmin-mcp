name: today-refresh
# Mid-day refresh — every 2 hours, repulls today's metrics + activities +
# activity details. Keeps the cache current for sessions completed during
# the day so claude.ai /weekly and /session-review can read fresh data
# without waiting for the 3am nightly.
#
# Scheduled runs will NOT resume after a workflow disable+enable until
# this file is committed. Bump the header comment to trigger GitHub's
# schedule re-registration when needed.

on:
  schedule:
    # Every 2 hours. Garmin OAuth2 access tokens live about 1 hour, so a
    # mid-day job that actually refreshes Garmin data must be allowed to
    # rotate OAuth when it wakes up. Keep the cadence modest so we get
    # useful same-day cache updates without creating dozens of exchange
    # attempts from GitHub's rotating runners.
    - cron: '0 */2 * * *'
  workflow_dispatch:

concurrency:
  group: garmin-refresh
  cancel-in-progress: false

jobs:
  refresh:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11.9"

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Run today refresh
        env:
          GARTH_TOKENS_B64: ${{ secrets.GARTH_TOKENS_B64 }}
          S3_CACHE_BUCKET: ${{ secrets.S3_CACHE_BUCKET }}
          S3_ENDPOINT_URL: ${{ secrets.S3_ENDPOINT_URL }}
          S3_CACHE_PREFIX: ${{ secrets.S3_CACHE_PREFIX }}
          AWS_ACCESS_KEY_ID: ${{ secrets.AWS_ACCESS_KEY_ID }}
          AWS_SECRET_ACCESS_KEY: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          GARMIN_READONLY: "false"
          # Scheduled refreshes should fail fast on Garmin 429s. Retrying
          # through an account throttle tends to extend the throttle window.
          GARMIN_RATE_LIMIT_MAX_RETRIES: "0"
          # Today-refresh does real Garmin reads. Because access tokens
          # last ~1h and this job runs every 2h, it must be allowed to
          # rotate OAuth. Workflow concurrency + the in-process token
          # lock keep that to one exchange attempt per run.
          ALLOW_OAUTH_REFRESH: "true"
        run: python scripts/today_refresh.py
