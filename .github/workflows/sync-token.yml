name: sync-token
# One-shot: overwrites the R2 token blob with the contents of the
# GARMIN_TOKENS_B64 secret AND clears any active OAuth cooldown.
#
# Use this after rotating the GARMIN_TOKENS_B64 secret with a fresh
# token from bootstrap.py — without it, the cached R2 token (likely
# stale) wins because R2 is preferred over env.
#
# Trigger via: gh workflow run sync-token.yml -R <owner>/<repo>

on:
  workflow_dispatch:

jobs:
  sync:
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11.9"

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Push env-token to R2 + clear cooldown
        env:
          GARMIN_TOKENS_B64: ${{ secrets.GARMIN_TOKENS_B64 }}
          S3_CACHE_BUCKET: ${{ secrets.S3_CACHE_BUCKET }}
          S3_ENDPOINT_URL: ${{ secrets.S3_ENDPOINT_URL }}
          S3_CACHE_PREFIX: ${{ secrets.S3_CACHE_PREFIX }}
          AWS_ACCESS_KEY_ID: ${{ secrets.AWS_ACCESS_KEY_ID }}
          AWS_SECRET_ACCESS_KEY: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
        run: |
          python <<'PY'
          import base64, sys, time, json
          from app import cache, tokens

          if not cache.enabled():
              print("R2 cache not configured", file=sys.stderr)
              sys.exit(1)

          import os
          b64 = os.environ.get("GARMIN_TOKENS_B64")
          if not b64:
              print("GARMIN_TOKENS_B64 not set", file=sys.stderr)
              sys.exit(1)

          # Sanity-check the env token before overwriting R2 with it.
          raw = base64.b64decode(b64).decode()
          try:
              data = json.loads(raw)
          except Exception as e:
              print(f"ERROR: GARMIN_TOKENS_B64 is not valid JSON: {e}", file=sys.stderr)
              sys.exit(1)

          di_token = data.get("di_token")
          di_refresh = data.get("di_refresh_token")
          if not di_token:
              print("ERROR: di_token missing from token JSON", file=sys.stderr)
              sys.exit(1)

          # Decode the JWT access token to check expiry.
          import datetime as dt
          exp = tokens._decode_jwt_exp(di_token)
          if exp is not None:
              now = time.time()
              print(f"env token: di_token expires at "
                    f"{dt.datetime.fromtimestamp(exp).isoformat()} "
                    f"({(exp-now)/3600:+.2f}h)")
              if exp - now < 60:
                  print("ERROR: env token is already expired or near-expired. "
                        "Re-run bootstrap.py to mint fresh tokens.", file=sys.stderr)
                  sys.exit(1)
          else:
              print("env token: di_token expiry unknown (not a JWT or no exp claim)")

          di_ref_exp = tokens._decode_jwt_exp(di_refresh) if di_refresh else None
          if di_ref_exp is not None:
              now = time.time()
              print(f"env token: di_refresh_token expires at "
                    f"{dt.datetime.fromtimestamp(di_ref_exp).isoformat()} "
                    f"({(di_ref_exp-now)/86400:+.2f}d)")
          else:
              print("env token: di_refresh_token expiry unknown (opaque or missing)")

          # Overwrite R2 with env contents.
          c = cache._client()
          c.put_object(
              Bucket=cache.BUCKET,
              Key=tokens._r2_key(),
              Body=raw.encode(),
              ContentType="application/json",
          )
          print(f"R2 token overwritten with env contents ({len(raw)} bytes)")

          # Clear cooldowns.
          for key in (tokens._cooldown_key(), tokens._api_cooldown_key()):
              try:
                  c.head_object(Bucket=cache.BUCKET, Key=key)
              except Exception as ex:
                  msg = str(ex).lower()
                  if "not found" in msg or "404" in msg or "nosuchkey" in msg:
                      print(f"{key}: already absent")
                      continue
                  print(f"{key}: head failed: {ex}", file=sys.stderr)
                  continue
              c.delete_object(Bucket=cache.BUCKET, Key=key)
              print(f"{key}: deleted")

          print("Done. Next refresh runs will use the env-fresh token.")
          PY
