name: daily-refresh
# Keeps the R2 cache current with yesterday's Garmin data.
# Talks to Garmin directly via app.garmin (not through the web MCP, which
# runs in readonly mode). Writes to the shared R2 bucket.

on:
  schedule:
    # 03:17 UTC — off-the-hour to avoid top-of-hour cron contention, and
    # during European night / US late evening when Garmin's OAuth endpoint
    # sees the least global traffic. GitHub Actions cron is always UTC
    # and doesn't honor DST.
    - cron: '17 3 * * *'
  workflow_dispatch:

concurrency:
  group: garmin-refresh
  cancel-in-progress: false

jobs:
  refresh:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11.9"

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Run daily refresh
        env:
          GARTH_TOKENS_B64: ${{ secrets.GARTH_TOKENS_B64 }}
          S3_CACHE_BUCKET: ${{ secrets.S3_CACHE_BUCKET }}
          S3_ENDPOINT_URL: ${{ secrets.S3_ENDPOINT_URL }}
          S3_CACHE_PREFIX: ${{ secrets.S3_CACHE_PREFIX }}
          AWS_ACCESS_KEY_ID: ${{ secrets.AWS_ACCESS_KEY_ID }}
          AWS_SECRET_ACCESS_KEY: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          GARMIN_READONLY: "false"
          # Fail fast on 429s — retrying through a throttle window extends it.
          GARMIN_RATE_LIMIT_MAX_RETRIES: "0"
          # Use the 48h code default for both cooldowns (tokens.py).
          # Both daily- and today-refresh now check the API 429 cooldown at
          # startup and abort before touching Garmin if it's still active.
          ALLOW_OAUTH_REFRESH: "true"
        run: python scripts/daily_refresh.py
