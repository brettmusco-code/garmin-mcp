services:
  - type: web
    name: garmin-mcp
    runtime: python
    plan: free
    buildCommand: pip install -r requirements.txt
    startCommand: uvicorn app.main:app --host 0.0.0.0 --port $PORT
    healthCheckPath: /health
    envVars:
      - key: MCP_BEARER_TOKEN
        sync: false
      - key: GARTH_TOKENS_B64
        sync: false
      # The public MCP service should never call Garmin directly. GitHub
      # Actions owns cache warming and OAuth rotation; the web service only
      # reads R2 so Claude/web traffic cannot amplify Garmin rate limits.
      - key: GARMIN_READONLY
        value: "true"
      - key: ALLOW_OAUTH_REFRESH
        value: "false"
      - key: PYTHON_VERSION
        value: "3.11.9"
